<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" role="img" aria-label="Custom Software development — code editor mockup">
  <defs>
    <linearGradient id="csBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A5DAB"/><stop offset="100%" stop-color="#0D1B3E"/>
    </linearGradient>
    <filter id="csShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/><feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .code-tok { font-family: 'Monaco', 'Courier New', monospace; font-size: 11px; }
    </style>
  </defs>

  <rect width="560" height="420" rx="20" fill="url(#csBg)"/>
  <circle cx="80" cy="80" r="120" fill="#FFFFFF" opacity="0.04"/>
  <circle cx="480" cy="360" r="100" fill="#F5B731" opacity="0.06"/>

  <!-- Editor window -->
  <g filter="url(#csShadow)">
    <rect x="40" y="40" width="350" height="340" rx="14" fill="#1E293B"/>
    <rect x="40" y="40" width="350" height="38" rx="14" fill="#0F172A"/>
    <rect x="40" y="64" width="350" height="14" fill="#0F172A"/>
    <circle cx="62" cy="59" r="5" fill="#FF6B6B"/><circle cx="80" cy="59" r="5" fill="#FFD06A"/><circle cx="98" cy="59" r="5" fill="#51CF66"/>
    <rect x="130" y="50" width="100" height="20" rx="4" fill="#1E293B"/>
    <text x="138" y="63" font-family="Monaco, monospace" font-size="9" fill="#94A3B8">app.py</text>

    <!-- Line numbers -->
    <g font-family="Monaco, monospace" font-size="11" fill="#475569">
      <text x="56" y="105">1</text><text x="56" y="125">2</text><text x="56" y="145">3</text><text x="56" y="165">4</text>
      <text x="56" y="185">5</text><text x="56" y="205">6</text><text x="56" y="225">7</text><text x="56" y="245">8</text>
      <text x="56" y="265">9</text><text x="50" y="285">10</text><text x="50" y="305">11</text><text x="50" y="325">12</text>
    </g>

    <!-- Code lines (syntactic colors) -->
    <g class="code-tok">
      <text x="78" y="105"><tspan fill="#C084FC">from</tspan><tspan fill="#E2E8F0"> odoo </tspan><tspan fill="#C084FC">import</tspan><tspan fill="#E2E8F0"> models, fields</tspan></text>
      <text x="78" y="145"><tspan fill="#C084FC">class</tspan><tspan fill="#FCD34D"> SaleOrder</tspan><tspan fill="#E2E8F0">(models.Model):</tspan></text>
      <text x="92" y="165"><tspan fill="#94A3B8">_inherit = </tspan><tspan fill="#86EFAC">'sale.order'</tspan></text>
      <text x="92" y="205"><tspan fill="#F5B731">priority_score</tspan><tspan fill="#E2E8F0"> = fields.</tspan><tspan fill="#60A5FA">Integer</tspan><tspan fill="#E2E8F0">(</tspan></text>
      <text x="106" y="225"><tspan fill="#86EFAC">'Priority'</tspan><tspan fill="#E2E8F0">,</tspan></text>
      <text x="106" y="245"><tspan fill="#94A3B8">compute=</tspan><tspan fill="#86EFAC">'_compute_priority'</tspan><tspan fill="#E2E8F0">,</tspan></text>
      <text x="106" y="265"><tspan fill="#94A3B8">store=</tspan><tspan fill="#60A5FA">True</tspan></text>
      <text x="92" y="285"><tspan fill="#E2E8F0">)</tspan></text>
      <text x="92" y="325"><tspan fill="#94A3B8"># Built for your workflow</tspan></text>
    </g>

    <!-- Cursor blink -->
    <rect x="186" y="316" width="2" height="14" fill="#F5B731">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Right side: tech stack badges -->
  <g filter="url(#csShadow)">
    <rect x="410" y="60" width="120" height="320" rx="14" fill="#FFFFFF"/>
    <text x="425" y="84" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#0D1B3E">Tech Stack</text>

    <g transform="translate(425, 100)">
      <rect width="90" height="32" rx="6" fill="#F5B731"/>
      <text x="10" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#0D1B3E">Odoo 18</text>
    </g>
    <g transform="translate(425, 140)">
      <rect width="90" height="32" rx="6" fill="#DBEAFE"/>
      <text x="10" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#1E40AF">React</text>
    </g>
    <g transform="translate(425, 180)">
      <rect width="90" height="32" rx="6" fill="#DCFCE7"/>
      <text x="10" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#166534">Python</text>
    </g>
    <g transform="translate(425, 220)">
      <rect width="90" height="32" rx="6" fill="#FEF3C7"/>
      <text x="10" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#92400E">Flutter</text>
    </g>
    <g transform="translate(425, 260)">
      <rect width="90" height="32" rx="6" fill="#F3E8FF"/>
      <text x="10" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#6B21A8">PostgreSQL</text>
    </g>
    <g transform="translate(425, 300)">
      <rect width="90" height="32" rx="6" fill="#CCFBF1"/>
      <text x="10" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#0F766E">REST API</text>
    </g>
    <g transform="translate(425, 340)">
      <rect width="90" height="32" rx="6" fill="#E0E7FF"/>
      <text x="10" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#3730A3">Docker</text>
    </g>
  </g>

  <g transform="translate(40, 388)">
    <rect width="160" height="20" rx="10" fill="#F5B731"/>
    <text x="14" y="14" font-family="Inter, sans-serif" font-size="9" fill="#0D1B3E" font-weight="800">YOU OWN THE CODE ✓</text>
  </g>
</svg>
