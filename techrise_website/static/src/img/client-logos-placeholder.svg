<?xml version="1.0" encoding="UTF-8"?>
<!-- Placeholder client logos for the Accounting Software landing page.
     TODO: Replace with real client logos. These are stylized text-as-logo
     marks designed to be visibly generic so visitors and the team can tell
     they're placeholders, not impersonations of real brands. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 80" role="img" aria-label="Sample client logos — to be replaced with real customers">
  <g fill="#94A3B8">
    <!-- 1. Healthcare-themed -->
    <g transform="translate(20, 18)">
      <path d="M22 0 L26 18 L44 22 L26 26 L22 44 L18 26 L0 22 L18 18 Z" opacity="0.5"/>
      <text x="55" y="30" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="0.5">SAMPLE</text>
      <text x="55" y="48" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="500" letter-spacing="2">HEALTHCARE</text>
    </g>

    <!-- 2. Construction-themed -->
    <g transform="translate(180, 18)">
      <rect x="0" y="6" width="30" height="30" rx="4" opacity="0.5"/>
      <rect x="6" y="0" width="18" height="6" opacity="0.7"/>
      <text x="42" y="30" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">CLIENT</text>
      <text x="42" y="48" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="500" letter-spacing="2">CONTRACTING</text>
    </g>

    <!-- 3. Retail-themed -->
    <g transform="translate(340, 18)">
      <circle cx="18" cy="20" r="18" opacity="0.5"/>
      <text x="13" y="26" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">R</text>
      <text x="48" y="30" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">DEMO</text>
      <text x="48" y="48" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="500" letter-spacing="2">RETAIL GROUP</text>
    </g>

    <!-- 4. F&B-themed -->
    <g transform="translate(500, 18)">
      <path d="M0 36 Q0 0 18 0 Q36 0 36 36 Z" opacity="0.5"/>
      <text x="46" y="30" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">EXAMPLE</text>
      <text x="46" y="48" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="500" letter-spacing="2">F&amp;B BRANDS</text>
    </g>

    <!-- 5. Real Estate-themed -->
    <g transform="translate(700, 18)">
      <path d="M18 0 L36 14 L36 36 L24 36 L24 24 L12 24 L12 36 L0 36 L0 14 Z" opacity="0.5"/>
      <text x="46" y="30" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">YOUR</text>
      <text x="46" y="48" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="500" letter-spacing="2">REAL ESTATE</text>
    </g>
  </g>
</svg>
