<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" role="img" aria-label="Inventory &amp; Procurement dashboard mockup">
  <defs>
    <linearGradient id="invBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A5DAB"/><stop offset="100%" stop-color="#0D1B3E"/>
    </linearGradient>
    <filter id="invShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/><feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="560" height="420" rx="20" fill="url(#invBg)"/>
  <circle cx="80" cy="80" r="120" fill="#FFFFFF" opacity="0.04"/>
  <circle cx="480" cy="360" r="100" fill="#F5B731" opacity="0.06"/>

  <g filter="url(#invShadow)">
    <rect x="40" y="40" width="480" height="340" rx="14" fill="#FFFFFF"/>
    <rect x="40" y="40" width="480" height="42" rx="14" fill="#0D1B3E"/>
    <rect x="40" y="68" width="480" height="14" fill="#0D1B3E"/>
    <circle cx="62" cy="61" r="5" fill="#FF6B6B"/><circle cx="80" cy="61" r="5" fill="#FFD06A"/><circle cx="98" cy="61" r="5" fill="#51CF66"/>
    <text x="130" y="65" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Inventory · Multi-Warehouse Live</text>

    <!-- Stats -->
    <g transform="translate(60, 100)">
      <rect width="135" height="70" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="12" y="22" font-family="Inter, sans-serif" font-size="10" fill="#64748B">STOCK VALUE</text>
      <text x="12" y="46" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#0D1B3E">AED 4.2M</text>
      <text x="12" y="62" font-family="Inter, sans-serif" font-size="9" fill="#1A5DAB" font-weight="700">3 warehouses</text>
    </g>
    <g transform="translate(212, 100)">
      <rect width="135" height="70" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="12" y="22" font-family="Inter, sans-serif" font-size="10" fill="#64748B">LOW STOCK</text>
      <text x="12" y="46" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#DC2626">12</text>
      <text x="12" y="62" font-family="Inter, sans-serif" font-size="9" fill="#DC2626" font-weight="700">Reorder triggered</text>
    </g>
    <g transform="translate(364, 100)">
      <rect width="135" height="70" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="12" y="22" font-family="Inter, sans-serif" font-size="10" fill="#64748B">OPEN POs</text>
      <text x="12" y="46" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#0D1B3E">28</text>
      <text x="12" y="62" font-family="Inter, sans-serif" font-size="9" fill="#F59E0B" font-weight="700">7 pending approval</text>
    </g>

    <!-- Warehouse grid -->
    <g transform="translate(60, 190)">
      <rect width="287" height="170" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0D1B3E">Warehouses</text>

      <g transform="translate(14, 36)">
        <rect width="80" height="50" rx="6" fill="#DBEAFE"/>
        <text x="10" y="18" font-family="Inter, sans-serif" font-size="9" fill="#1E40AF" font-weight="800">Abu Dhabi</text>
        <text x="10" y="32" font-family="Inter, sans-serif" font-size="14" fill="#0D1B3E" font-weight="800">2,148</text>
        <text x="10" y="44" font-family="Inter, sans-serif" font-size="7" fill="#1E40AF">items</text>
      </g>
      <g transform="translate(102, 36)">
        <rect width="80" height="50" rx="6" fill="#DCFCE7"/>
        <text x="10" y="18" font-family="Inter, sans-serif" font-size="9" fill="#166534" font-weight="800">Dubai</text>
        <text x="10" y="32" font-family="Inter, sans-serif" font-size="14" fill="#0D1B3E" font-weight="800">3,720</text>
        <text x="10" y="44" font-family="Inter, sans-serif" font-size="7" fill="#166534">items</text>
      </g>
      <g transform="translate(190, 36)">
        <rect width="80" height="50" rx="6" fill="#FEF3C7"/>
        <text x="10" y="18" font-family="Inter, sans-serif" font-size="9" fill="#92400E" font-weight="800">Sharjah</text>
        <text x="10" y="32" font-family="Inter, sans-serif" font-size="14" fill="#0D1B3E" font-weight="800">1,094</text>
        <text x="10" y="44" font-family="Inter, sans-serif" font-size="7" fill="#92400E">items</text>
      </g>

      <!-- Recent transfers -->
      <text x="14" y="108" font-family="Inter, sans-serif" font-size="10" fill="#64748B" font-weight="700">Recent transfers</text>
      <g transform="translate(14, 118)">
        <rect width="259" height="20" rx="4" fill="#F8FAFC"/>
        <text x="8" y="13" font-family="Inter, sans-serif" font-size="9" fill="#0D1B3E">AD → DXB · 48 units · ✓ Done</text>
      </g>
      <g transform="translate(14, 142)">
        <rect width="259" height="20" rx="4" fill="#F8FAFC"/>
        <text x="8" y="13" font-family="Inter, sans-serif" font-size="9" fill="#0D1B3E">DXB → SHJ · 12 units · ⋯ In transit</text>
      </g>
    </g>

    <!-- Pending POs -->
    <g transform="translate(364, 190)">
      <rect width="135" height="170" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0D1B3E">To Approve</text>
      <g transform="translate(12, 38)">
        <rect width="111" height="32" rx="5" fill="#F8FAFC"/>
        <text x="8" y="14" font-family="Inter, sans-serif" font-size="9" fill="#0D1B3E" font-weight="700">PO/2026/0418</text>
        <text x="8" y="25" font-family="Inter, sans-serif" font-size="8" fill="#64748B">AED 12,450</text>
      </g>
      <g transform="translate(12, 76)">
        <rect width="111" height="32" rx="5" fill="#F8FAFC"/>
        <text x="8" y="14" font-family="Inter, sans-serif" font-size="9" fill="#0D1B3E" font-weight="700">PO/2026/0419</text>
        <text x="8" y="25" font-family="Inter, sans-serif" font-size="8" fill="#64748B">AED 38,200</text>
      </g>
      <g transform="translate(12, 114)">
        <rect width="111" height="32" rx="5" fill="#F8FAFC"/>
        <text x="8" y="14" font-family="Inter, sans-serif" font-size="9" fill="#0D1B3E" font-weight="700">PO/2026/0420</text>
        <text x="8" y="25" font-family="Inter, sans-serif" font-size="8" fill="#64748B">AED 6,890</text>
      </g>
    </g>
  </g>

  <g transform="translate(420, 30)">
    <rect width="120" height="40" rx="20" fill="#F5B731" filter="url(#invShadow)"/>
    <text x="14" y="17" font-family="Inter, sans-serif" font-size="8" fill="#0D1B3E" font-weight="700">BARCODE</text>
    <text x="14" y="30" font-family="Inter, sans-serif" font-size="9" fill="#0D1B3E" font-weight="800">SCANNER READY</text>
    <rect x="98" y="11" width="2" height="18" fill="#0D1B3E"/>
    <rect x="102" y="11" width="1" height="18" fill="#0D1B3E"/>
    <rect x="105" y="11" width="3" height="18" fill="#0D1B3E"/>
    <rect x="110" y="11" width="1" height="18" fill="#0D1B3E"/>
    <rect x="113" y="11" width="2" height="18" fill="#0D1B3E"/>
  </g>
</svg>
